services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: brain_game
      POSTGRES_USER: brain_game
      POSTGRES_PASSWORD: brain_game
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain_game"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
